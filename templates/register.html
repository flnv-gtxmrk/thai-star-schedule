{% extends "base.html" %}
{% block title %}{{ g.t('register') }} — {{ g.t('site_title') }}{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>{{ g.t('register') }}</h1>
            <p>{{ g.t('subtitle') }}</p>
        </div>
        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>{{ g.t('username') }}</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" required autocomplete="username" placeholder="Choose a username" minlength="3" maxlength="80">
                </div>
            </div>
            <div class="form-group">
                <label>{{ g.t('email') }}</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" required autocomplete="email" placeholder="your@email.com">
                </div>
            </div>
            <div class="form-group">
                <label>{{ g.t('password') }}</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" required autocomplete="new-password" placeholder="Min. 6 characters" minlength="6">
                </div>
            </div>
            <div class="form-group">
                <label>{{ g.t('confirm_password') }}</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="confirm_password" required autocomplete="new-password" placeholder="Confirm password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:var(--sp-4)">{{ g.t('register') }}</button>
        </form>
        <div class="auth-footer">
            <p>{{ g.t('login') }}? <a href="{{ url_for('login') }}">{{ g.t('login') }}</a></p>
        </div>
    </div>
</div>
{% endblock %}
