{% extends "base.html" %}
{% block title %}{{ g.t('login') }} — {{ g.t('site_title') }}{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>{{ g.t('login') }}</h1>
            <p>{{ g.t('welcome') }}</p>
        </div>
        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>{{ g.t('username') }}</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" required autocomplete="username" placeholder="Username">
                </div>
            </div>
            <div class="form-group">
                <label>{{ g.t('password') }}</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" required autocomplete="current-password" placeholder="Password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:var(--sp-4)">{{ g.t('login') }}</button>
        </form>
        <div class="auth-footer">
            <p>{{ g.t('register') }}? <a href="{{ url_for('register') }}">{{ g.t('register') }}</a></p>
        </div>
    </div>
</div>
{% endblock %}
