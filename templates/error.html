{% extends "base.html" %}
{% block title %}{{ code }} — {{ g.t('site_title') }}{% endblock %}
{% block content %}
<div class="error-page">
    <div>
        <h1 class="error-code">{{ code }}</h1>
        <p class="error-message">{{ message }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> {{ g.t('home') }}</a>
    </div>
</div>
{% endblock %}
